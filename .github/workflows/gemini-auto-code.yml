name: Gemini Auto-Code Workflow

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  auto-code:
    if: github.event.label.name == 'Ready'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini Task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          # Construct the prompt using environment variables
          printf "The status of this issue is 'Ready' in repository %s.\nIssue #%s: %s\n\n" "$REPO" "$ISSUE_NUMBER" "$ISSUE_TITLE" > prompt.txt
          printf "%s\n\n" "$ISSUE_BODY" >> prompt.txt
          printf "Research the codebase, implement the fix/feature, and create a Pull Request on a new branch." >> prompt.txt
          
          # Run Gemini CLI in headless mode
          cat prompt.txt | gemini -p
