name: Gemini Auto-Code Workflow

on:
  issues:
    types: [labeled]

jobs:
  auto-code:
    if: github.event.label.name == 'Ready'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini Task
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Construct the prompt using environment variables
          echo "The status of this issue is 'Ready'. Issue #$ISSUE_NUMBER: $ISSUE_TITLE" > prompt.txt
          echo "" >> prompt.txt
          echo "$ISSUE_BODY" >> prompt.txt
          echo "" >> prompt.txt
          echo "Research the codebase, implement the fix/feature, and create a Pull Request on a new branch." >> prompt.txt
          
          # Run Gemini CLI in headless mode
          cat prompt.txt | gemini -p
